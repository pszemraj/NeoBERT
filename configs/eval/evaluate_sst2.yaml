task: "glue"
seed: 42

# Point to the actual pretraining config used for the checkpoint
model:
  pretrained_config_path: "configs/pretrain/pretrain_neobert100m_smollm2data.yaml"
  pretrained_checkpoint_dir: "outputs/smollm2_custom_tokenizer"
  pretrained_checkpoint: 100000
  from_hub: false
  classifier_dropout: 0.1
  classifier_init_range: 0.02

trainer:
  output_dir: "./glue_outputs/sst2"
  run_name: "neobert_100k_sst2_eval"
  train_batch_size: 16
  eval_batch_size: 32
  gradient_accumulation_steps: 1
  num_train_epochs: 3
  eval_steps: 500
  max_ckpt: 3
  early_stopping: 3
  mixed_precision: "bf16"
  tf32: true

glue:
  task_name: "sst2"
  num_labels: 2
  max_seq_length: 128

optimizer:
  hparams:
    lr: 2e-5
    weight_decay: 0.01
    betas: [0.9, 0.999]
    eps: 1e-8

scheduler:
  name: "linear"
  warmup_percent: 10
  decay_percent: null
  warmup_steps: null
  decay_steps: null

wandb:
  project: "neobert-evals"
  name: "glue-sst2-100k"
  entity: null
  tags: ["glue", "sst2", "100k_checkpoint"]
  dir: "logs/wandb"
  mode: "online"
  resume: false